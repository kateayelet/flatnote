<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlatNote Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }
        
        @media (prefers-color-scheme: dark) {
            html, body {
                background-color: #000000;
                color: #ffffff;
            }
            
            .CodeMirror {
                background-color: #000000;
                color: #ffffff;
            }
            
            .editor-toolbar {
                background-color: #1c1c1e;
                border-color: #38383a;
            }
            
            .editor-toolbar a {
                color: #ffffff !important;
            }
            
            .editor-toolbar a:hover,
            .editor-toolbar a.active {
                background-color: #2c2c2e;
                border-color: #48484a;
            }
            
            .CodeMirror-cursor {
                border-left-color: #ffffff;
            }
            
            .cm-header {
                color: #0a84ff;
            }
            
            .cm-quote {
                color: #64d2ff;
            }
            
            .cm-link {
                color: #bf5af2;
            }
            
            .cm-url {
                color: #5ac8fa;
            }
        }
        
        #editor-container {
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .EasyMDEContainer {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .CodeMirror {
            flex: 1;
            height: auto;
            font-size: 16px;
            line-height: 1.6;
            padding: 16px;
            border: none;
        }
        
        .editor-toolbar {
            border: none;
            border-bottom: 1px solid #e5e5e5;
        }
        
        @media (prefers-color-scheme: dark) {
            .editor-toolbar {
                border-bottom-color: #38383a;
            }
        }
        
        .editor-toolbar.disabled-for-preview a:not(.no-disable) {
            opacity: 0.3;
            pointer-events: none;
        }
        
        .CodeMirror-scroll {
            padding-bottom: 16px;
        }
        
        /* Markdown preview styles */
        .editor-preview,
        .editor-preview-side {
            background-color: #ffffff;
            padding: 16px;
            font-size: 16px;
            line-height: 1.6;
        }
        
        @media (prefers-color-scheme: dark) {
            .editor-preview,
            .editor-preview-side {
                background-color: #000000;
                color: #ffffff;
            }
            
            .editor-preview h1,
            .editor-preview h2,
            .editor-preview h3,
            .editor-preview h4,
            .editor-preview h5,
            .editor-preview h6,
            .editor-preview-side h1,
            .editor-preview-side h2,
            .editor-preview-side h3,
            .editor-preview-side h4,
            .editor-preview-side h5,
            .editor-preview-side h6 {
                color: #ffffff;
            }
            
            .editor-preview code,
            .editor-preview-side code {
                background-color: #1c1c1e;
                color: #ffffff;
            }
            
            .editor-preview pre,
            .editor-preview-side pre {
                background-color: #1c1c1e;
                border-color: #38383a;
            }
            
            .editor-preview blockquote,
            .editor-preview-side blockquote {
                border-left-color: #48484a;
                color: #ebebf5;
            }
            
            .editor-preview a,
            .editor-preview-side a {
                color: #0a84ff;
            }
        }
        
        .editor-preview h1,
        .editor-preview h2,
        .editor-preview h3,
        .editor-preview h4,
        .editor-preview h5,
        .editor-preview h6,
        .editor-preview-side h1,
        .editor-preview-side h2,
        .editor-preview-side h3,
        .editor-preview-side h4,
        .editor-preview-side h5,
        .editor-preview-side h6 {
            margin-top: 24px;
            margin-bottom: 16px;
            font-weight: 600;
            line-height: 1.25;
        }
        
        .editor-preview ul,
        .editor-preview ol,
        .editor-preview-side ul,
        .editor-preview-side ol {
            padding-left: 2em;
            margin-bottom: 16px;
        }
        
        .editor-preview li,
        .editor-preview-side li {
            margin-bottom: 4px;
        }
        
        .editor-preview pre,
        .editor-preview-side pre {
            padding: 16px;
            overflow: auto;
            background-color: #f6f6f6;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        
        .editor-preview code,
        .editor-preview-side code {
            padding: 2px 6px;
            background-color: #f6f6f6;
            border-radius: 3px;
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
        }
        
        .editor-preview blockquote,
        .editor-preview-side blockquote {
            padding: 0 1em;
            border-left: 4px solid #e5e5e5;
            color: #6e6e73;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div id="editor-container">
        <textarea id="editor"></textarea>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
    <script>
        let easyMDE;
        let contentChangeTimeout;

        // Initialize EasyMDE
        document.addEventListener('DOMContentLoaded', () => {
            easyMDE = new EasyMDE({
                element: document.getElementById('editor'),
                autoDownloadFontAwesome: false,
                spellChecker: false,
                status: false,
                toolbar: [
                    'bold',
                    'italic',
                    'heading',
                    '|',
                    'quote',
                    'unordered-list',
                    'ordered-list',
                    'check-list',
                    '|',
                    'link',
                    'image',
                    '|',
                    'preview',
                    'side-by-side',
                    'fullscreen',
                    '|',
                    'guide'
                ],
                placeholder: 'Start typing...',
                hideIcons: ['guide'],
                showIcons: ['code', 'table'],
                renderingConfig: {
                    singleLineBreaks: false,
                    codeSyntaxHighlighting: true,
                },
                autofocus: true,
                lineWrapping: true,
                indentWithTabs: false,
                tabSize: 4,
            });

            // Listen for content changes
            easyMDE.codemirror.on('change', () => {
                clearTimeout(contentChangeTimeout);
                contentChangeTimeout = setTimeout(() => {
                    notifyContentChanged();
                }, 300);
            });

            // Notify Swift that editor is ready
            window.webkit.messageHandlers.flatnote.postMessage({
                action: 'editorReady'
            });
        });

        // Function to set content from Swift
        function setContent(markdown) {
            if (easyMDE) {
                easyMDE.value(markdown);
            }
        }

        // Function to get content
        function getContent() {
            return easyMDE ? easyMDE.value() : '';
        }

        // Notify Swift of content changes
        function notifyContentChanged() {
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.flatnote) {
                window.webkit.messageHandlers.flatnote.postMessage({
                    action: 'contentChanged',
                    markdown: getContent()
                });
            }
        }
    </script>
</body>
</html>
